# Bench-only Mosquitto config — anonymous access on 1883, no TLS.
# Used by BENCH.md Step 1. Do NOT use this in production.

listener 1883
allow_anonymous true

# Persistence so the broker survives a restart without losing retained messages.
persistence true
persistence_location /mosquitto/data/

# Quiet the logs — bench testing only needs the connect/disconnect signal.
log_dest stdout
log_type warning
log_type error
log_type notice
