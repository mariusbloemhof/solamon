[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "solamon-cloud-app"
version = "0.0.0"
requires-python = ">=3.12"
dependencies = [
    "solamon-profile-loader",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "asyncpg>=0.29",
    "asyncio-mqtt>=0.16",
    "pydantic[email]>=2.6",
    "bcrypt>=4.1",
    "pyjwt>=2.8",
    "structlog>=24.1",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "testcontainers[postgresql,mqtt]>=4.0",
    "ruff>=0.4",
]

[project.scripts]
solamon-cloud-seed = "cloud_app.seed:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
solamon-profile-loader = { workspace = true }
